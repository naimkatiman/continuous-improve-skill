name: Post to X (Twitter)

on:
  release:
    types: [published]

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tweet from release
        id: tweet
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          BODY=$(cat <<'TWEET'
          The 7 Laws of AI Agent Discipline — $VERSION just shipped.

          Your AI agent says "Done!" but didn't test anything. These 7 laws fix that.

          - 104 tests, zero dependencies
          - MCP server (beginner + expert modes)
          - Works with Claude Code, Cursor, Codex, Gemini CLI
          - CodeQL security scanning
          - Auto-leveling instinct learning

          npx continuous-improvement install

          https://github.com/naimkatiman/continuous-improvement/releases/tag/$VERSION

          #ClaudeCode #AIAgent #OpenSource #BuildInPublic
          TWEET
          )
          BODY=$(echo "$BODY" | sed "s/\$VERSION/$VERSION/g")
          echo "tweet<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post to X
        uses: ethanthatonekid/send-tweet-action@v2
        with:
          status: ${{ steps.tweet.outputs.tweet }}
          consumer-key: ${{ secrets.X_CONSUMER_KEY }}
          consumer-secret: ${{ secrets.X_CONSUMER_SECRET }}
          access-token: ${{ secrets.X_ACCESS_TOKEN }}
          access-token-secret: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
